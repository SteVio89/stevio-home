# Shared security headers. nginx's add_header does NOT inherit into a location
# block that declares its own add_header, so this snippet must be `include`d in
# the server block AND in every location that sets other headers (e.g. the
# /media/ and /assets/ blocks set Cache-Control). Without the re-include, those
# paths would be served with no CSP/nosniff — a stored-XSS trap for uploaded media.
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
add_header Content-Security-Policy "default-src 'self'; img-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; script-src 'self'; frame-ancestors 'none'" always;
