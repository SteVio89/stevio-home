# Shared security headers. nginx's add_header does NOT inherit into a location
# block that declares its own add_header, so this snippet must be `include`d in
# the server block AND in every location that sets other headers (e.g. the
# /media/ and /assets/ blocks set Cache-Control). Without the re-include, those
# paths would be served with no CSP/nosniff — a stored-XSS trap for uploaded media.
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
# Paddle Billing runs an in-page checkout overlay: Paddle.js loads from
# cdn.paddle.com, the overlay renders in a *.paddle.com iframe (frame-src) and
# calls *.paddle.com over XHR (connect-src). All Paddle hosts are subdomains of
# paddle.com, so a single wildcard covers CDN, checkout, and sandbox variants.
add_header Content-Security-Policy "default-src 'self'; img-src 'self' https://*.paddle.com; style-src 'self' 'unsafe-inline' https://*.paddle.com; font-src 'self' https://*.paddle.com; script-src 'self' https://*.paddle.com; connect-src 'self' https://*.paddle.com; frame-src https://*.paddle.com; frame-ancestors 'none'" always;
