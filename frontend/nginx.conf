server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Behind Caddy (TLS terminator) on the internal docker network. Resolve the
    # real client IP from X-Forwarded-For so X-Real-IP forwarded to the backend
    # is the actual visitor, not Caddy's container IP — otherwise per-IP rate
    # limiting collapses to a single shared bucket. Only private ranges are
    # trusted; nginx is not published, so its only peer is the Caddy container.
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_types text/html text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Security headers (shared snippet — see file header for why it must be
    # re-included in every location that sets its own add_header).
    include /etc/nginx/security-headers.conf;

    # Serve uploaded media (icons, screenshots) directly with long cache
    # Note: /assets/ is reserved by Vite for bundled JS/CSS — use /media/ instead
    location /media/ {
        alias /data/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/security-headers.conf;
    }

    # Vite-built assets have content-hashed filenames — safe to cache forever
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/security-headers.conf;
    }

    # Dynamic robots.txt served by Go backend (BASE_URL-aware Sitemap URL)
    location = /robots.txt {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Dynamic sitemap served by the Go backend
    location = /sitemap.xml {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API requests → Go backend
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Increase timeouts for large file uploads and binary downloads
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 512m;
    }

    # Framework auth routes → Go backend (POST only)
    # GET /auth/verify?token=... is handled by the SPA (VerifyToken page),
    # which then POSTs the token to the backend via fetch.
    location /auth/ {
        if ($request_method = GET) {
            rewrite ^ /index.html last;
        }
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
